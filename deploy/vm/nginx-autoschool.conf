server {
  listen 80;
  server_name _;

  root /var/www/autoschool;
  index index.html;

  # Expo web / SPA routing fallback:
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Cache static assets aggressively (safe for fingerprinted files).
  location ~* \.(?:js|css|png|jpg|jpeg|gif|svg|ico|webp|ttf|woff|woff2)$ {
    try_files $uri =404;
    expires 30d;
    add_header Cache-Control "public, max-age=2592000, immutable";
  }
}

